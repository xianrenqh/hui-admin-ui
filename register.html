<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - huiAdmin</title>
  <link rel="stylesheet" href="lib/layui/css/layui.css">
  <link rel="stylesheet" href="assets/css/login.css">
  <!-- 用户自定义样式 -->
  <link rel="stylesheet" href="assets/css/custom.css">
  <style>
    .register-box {
      width: 420px;
      padding: 32px 36px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-box register-box">
      <div class="login-header">
        <img src="assets/images/logo.svg" alt="Logo" class="login-logo">
        <h1>huiAdmin</h1>
        <p>创建您的账户</p>
      </div>

      <form class="layui-form" lay-filter="registerForm">
        <div class="layui-form-item">
          <div class="layui-input-wrap">
            <i class="layui-icon layui-icon-username input-icon"></i>
            <input type="text" name="username" lay-verify="required|username" placeholder="请输入用户名" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-wrap">
            <i class="layui-icon layui-icon-email input-icon"></i>
            <input type="text" name="email" lay-verify="required|email" placeholder="请输入邮箱" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-wrap">
            <i class="layui-icon layui-icon-password input-icon"></i>
            <input type="password" name="password" lay-verify="required|pass" placeholder="请输入密码(6-20位)" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item">
          <div class="layui-input-wrap">
            <i class="layui-icon layui-icon-password input-icon"></i>
            <input type="password" name="repassword" lay-verify="required|repass" placeholder="请确认密码" class="layui-input">
          </div>
        </div>

        <div class="layui-form-item verify-row">
          <div class="layui-input-wrap" style="flex:1">
            <i class="layui-icon layui-icon-vercode input-icon"></i>
            <input type="text" name="captcha" lay-verify="required" placeholder="验证码" class="layui-input">
          </div>
          <canvas id="captchaCanvas" width="150" height="44" class="captcha-img" title="点击刷新验证码"></canvas>
        </div>

        <div class="layui-form-item" style="margin-top:24px">
          <button class="layui-btn layui-btn-fluid login-btn" lay-submit lay-filter="registerSubmit">注 册</button>
        </div>
      </form>

      <div class="login-footer">
        <span>已有账号？</span>
        <a href="login.html">立即登录</a>
      </div>
    </div>

    <div class="login-copyright">
      Copyright &copy; 2026 huiAdmin. All Rights Reserved.
    </div>
  </div>

  <script src="lib/layui/layui.js"></script>
  <script>
  layui.use(['form', 'layer'], function () {
    var form = layui.form;
    var layer = layui.layer;

    // 自定义验证规则
    form.verify({
      username: [/^[a-zA-Z0-9_\u4e00-\u9fa5]{2,20}$/, '用户名需2-20位，支持中英文、数字、下划线'],
      pass: [/^[\S]{6,20}$/, '密码必须6-20位且不能有空格'],
      repass: function (value) {
        var pwd = $('input[name="password"]').val();
        if (value !== pwd) return '两次输入的密码不一致';
      }
    });

    // 验证码
    var captchaCanvas = document.getElementById('captchaCanvas');
    var ctx = captchaCanvas.getContext('2d');

    function randomColor() {
      var r = Math.floor(Math.random() * 200) + 55;
      var g = Math.floor(Math.random() * 200) + 55;
      var b = Math.floor(Math.random() * 200) + 55;
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    function drawCaptcha() {
      var code = '';
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      ctx.clearRect(0, 0, 150, 44);
      ctx.fillStyle = '#f0f2f5';
      ctx.fillRect(0, 0, 150, 44);
      for (var i = 0; i < 4; i++) {
        ctx.strokeStyle = randomColor();
        ctx.beginPath();
        ctx.moveTo(Math.random() * 150, Math.random() * 44);
        ctx.lineTo(Math.random() * 150, Math.random() * 44);
        ctx.stroke();
      }
      for (var j = 0; j < 20; j++) {
        ctx.fillStyle = randomColor();
        ctx.beginPath();
        ctx.arc(Math.random() * 150, Math.random() * 44, 1, 0, 2 * Math.PI);
        ctx.fill();
      }
      for (var k = 0; k < 4; k++) {
        var ch = chars[Math.floor(Math.random() * chars.length)];
        code += ch;
        ctx.fillStyle = randomColor();
        ctx.font = 'bold 26px Arial';
        ctx.fillText(ch, 10 + k * 33 + Math.random() * 6, 32 + Math.random() * 6);
      }
      captchaCanvas.setAttribute('data-code', code);
    }

    drawCaptcha();
    captchaCanvas.addEventListener('click', drawCaptcha);

    // 注册提交
    form.on('submit(registerSubmit)', function (data) {
      var inputCode = data.field.captcha.toUpperCase();
      var realCode = captchaCanvas.getAttribute('data-code');
      if (inputCode !== realCode) {
        layer.msg('验证码错误', { icon: 2 });
        drawCaptcha();
        return false;
      }
      layer.msg('注册成功！即将跳转登录页...', { icon: 1, time: 1500 }, function () {
        location.href = 'login.html';
      });
      return false;
    });
  });
  </script>
</body>
</html>
