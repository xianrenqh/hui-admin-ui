<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按钮样式 - huiAdmin</title>
  <link rel="stylesheet" href="../../lib/layui/css/layui.css">
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/custom.css">
  <style>
    .demo-card { background: var(--card-bg, #fff); border-radius: 6px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); margin-bottom: 16px; }
    .demo-card h3 { font-size: 15px; margin-bottom: 16px; font-weight: 600; }
    .demo-card h4 { font-size: 13px; color: #999; margin: 16px 0 8px; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>
  <div class="demo-card">
    <h3>主题按钮</h3>
    <div class="btn-row">
      <button class="layui-btn">默认按钮</button>
      <button class="layui-btn layui-btn-primary">主要按钮</button>
      <button class="layui-btn layui-btn-normal">百搭按钮</button>
      <button class="layui-btn layui-btn-warm">暖色按钮</button>
      <button class="layui-btn layui-btn-danger">警告按钮</button>
      <button class="layui-btn layui-btn-disabled">禁用按钮</button>
    </div>

    <h4>圆角按钮</h4>
    <div class="btn-row">
      <button class="layui-btn layui-btn-radius">默认圆角</button>
      <button class="layui-btn layui-btn-primary layui-btn-radius">主要圆角</button>
      <button class="layui-btn layui-btn-normal layui-btn-radius">百搭圆角</button>
      <button class="layui-btn layui-btn-warm layui-btn-radius">暖色圆角</button>
      <button class="layui-btn layui-btn-danger layui-btn-radius">警告圆角</button>
    </div>

    <h4>按钮尺寸</h4>
    <div class="btn-row">
      <button class="layui-btn layui-btn-lg">大型按钮</button>
      <button class="layui-btn">默认按钮</button>
      <button class="layui-btn layui-btn-sm">小型按钮</button>
      <button class="layui-btn layui-btn-xs">迷你按钮</button>
    </div>

    <h4>带图标按钮</h4>
    <div class="btn-row">
      <button class="layui-btn"><i class="layui-icon layui-icon-add-1"></i> 新增</button>
      <button class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-edit"></i> 编辑</button>
      <button class="layui-btn layui-btn-danger"><i class="layui-icon layui-icon-delete"></i> 删除</button>
      <button class="layui-btn layui-btn-normal"><i class="layui-icon layui-icon-search"></i> 搜索</button>
      <button class="layui-btn layui-btn-warm"><i class="layui-icon layui-icon-download-circle"></i> 导出</button>
    </div>

    <h4>按钮组</h4>
    <div class="btn-row">
      <div class="layui-btn-group">
        <button class="layui-btn">新增</button>
        <button class="layui-btn">编辑</button>
        <button class="layui-btn">删除</button>
      </div>
    </div>

    <h4>流体按钮</h4>
    <div>
      <button class="layui-btn layui-btn-fluid">流体按钮（宽度自适应）</button>
    </div>
  </div>

  <div class="demo-card">
    <h3>按钮事件</h3>
    <div class="btn-row">
      <button class="layui-btn" id="btnClick">点击事件</button>
      <button class="layui-btn layui-btn-primary" id="btnLoad">加载状态</button>
    </div>
  </div>

  <script src="../../lib/layui/layui.js"></script>
  <script>
  layui.use(['layer'], function () {
    var layer = layui.layer;
    var $ = layui.$;

    $('#btnClick').click(function () {
      layer.msg('按钮被点击了', { icon: 1 });
    });

    $('#btnLoad').click(function () {
      var $this = $(this);
      $this.addClass('layui-btn-disabled').attr('disabled', true);
      $this.html('<i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...');
      setTimeout(function () {
        $this.removeClass('layui-btn-disabled').removeAttr('disabled');
        $this.html('加载状态');
        layer.msg('操作完成', { icon: 1 });
      }, 2000);
    });
  });
  </script>
</body>
</html>
