<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - huiAdmin</title>
  <link rel="stylesheet" href="../../lib/layui/css/layui.css">
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/custom.css">
  <style>
    .page-card { max-width: 500px; }
  </style>
</head>
<body>
  <div class="page-card">
    <h3>修改密码</h3>
    <form class="layui-form" lay-filter="pwdForm">
      <div class="layui-form-item">
        <label class="layui-form-label">旧密码</label>
        <div class="layui-input-block">
          <input type="password" name="oldPwd" lay-verify="required" placeholder="请输入旧密码" class="layui-input">
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">新密码</label>
        <div class="layui-input-block">
          <input type="password" name="newPwd" lay-verify="required|pass" placeholder="请输入新密码" class="layui-input">
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">确认密码</label>
        <div class="layui-input-block">
          <input type="password" name="confirmPwd" lay-verify="required" placeholder="请再次输入新密码" class="layui-input">
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button class="layui-btn" lay-submit lay-filter="pwdSubmit">确认修改</button>
          <button type="reset" class="layui-btn layui-btn-primary">重置</button>
        </div>
      </div>
    </form>
  </div>

  <script src="../../lib/layui/layui.js"></script>
  <script>
  layui.use(['form', 'layer'], function () {
    var form = layui.form;
    var layer = layui.layer;

    form.verify({
      pass: [/^[\S]{6,20}$/, '密码必须6-20位且不能有空格']
    });

    form.on('submit(pwdSubmit)', function (data) {
      if (data.field.newPwd !== data.field.confirmPwd) {
        layer.msg('两次输入的密码不一致', { icon: 2 });
        return false;
      }
      layer.msg('密码修改成功', { icon: 1 });
      return false;
    });
  });
  </script>
</body>
</html>
