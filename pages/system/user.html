<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - huiAdmin</title>
  <link rel="stylesheet" href="../../lib/layui/css/layui.css">
  <link rel="stylesheet" href="../../assets/css/common.css">
  <link rel="stylesheet" href="../../assets/css/custom.css">
</head>
<body>
  <div class="page-card">
    <div class="toolbar">
      <button class="layui-btn layui-btn-sm" id="btnAdd"><i class="layui-icon layui-icon-add-1"></i> 新增用户</button>
      <button class="layui-btn layui-btn-sm layui-btn-danger" id="btnDel"><i class="layui-icon layui-icon-delete"></i> 批量删除</button>
    </div>
    <table id="userTable" lay-filter="userTable"></table>
  </div>

  <script src="../../lib/layui/layui.js"></script>
  <script>
  layui.use(['table', 'layer'], function () {
    var table = layui.table;
    var layer = layui.layer;
    var $ = layui.$;

    table.render({
      elem: '#userTable',
      data: [
        { id: 1, name: '张三', account: 'zhangsan', email: 'zhangsan@example.com', role: '管理员', status: '启用' },
        { id: 2, name: '李四', account: 'lisi', email: 'lisi@example.com', role: '编辑', status: '启用' },
        { id: 3, name: '王五', account: 'wangwu', email: 'wangwu@example.com', role: '普通用户', status: '禁用' },
        { id: 4, name: '赵六', account: 'zhaoliu', email: 'zhaoliu@example.com', role: '编辑', status: '启用' },
        { id: 5, name: '孙七', account: 'sunqi', email: 'sunqi@example.com', role: '普通用户', status: '启用' }
      ],
      page: true,
      cols: [[
        { type: 'checkbox' },
        { field: 'id', title: 'ID', width: 80, sort: true },
        { field: 'name', title: '姓名', width: 100 },
        { field: 'account', title: '账号', width: 120 },
        { field: 'email', title: '邮箱', minWidth: 160 },
        { field: 'role', title: '角色', width: 100 },
        { field: 'status', title: '状态', width: 100, templet: function (d) {
          return d.status === '启用' ? '<span style="color:#16baaa">启用</span>' : '<span style="color:#f56c6c">禁用</span>';
        }},
        { title: '操作', width: 180, templet: function (d) {
          return '<a class="layui-btn layui-btn-xs" lay-event="edit">编辑</a>' +
                 '<a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="role">角色</a>' +
                 '<a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>';
        }}
      ]]
    });

    table.on('tool(userTable)', function (obj) {
      if (obj.event === 'edit') layer.msg('编辑：' + obj.data.name);
      else if (obj.event === 'role') layer.msg('设置角色：' + obj.data.name);
      else if (obj.event === 'del') {
        layer.confirm('确定删除吗？', function (i) { layer.close(i); layer.msg('已删除', { icon: 1 }); });
      }
    });

    $('#btnAdd').click(function () { layer.msg('打开新增用户表单'); });
    $('#btnDel').click(function () { layer.msg('批量删除'); });
  });
  </script>
</body>
</html>
